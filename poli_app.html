<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poli Comunidad</title>

<!-- OneSignal Push Notifications -->
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "228c0ea9-4330-44ef-9d3f-f07f297f9dd4",
  });
});
</script>

<style>

body{
margin:0;
font-family:system-ui;
background-color:#eef5ff;

background-image:
linear-gradient(45deg,#c7ddff 25%,transparent 25%),
linear-gradient(-45deg,#c7ddff 25%,transparent 25%),
linear-gradient(45deg,transparent 75%,#c7ddff 75%),
linear-gradient(-45deg,transparent 75%,#c7ddff 75%);

background-size:40px 40px;
background-position:0 0,0 20px,20px -20px,-20px 0px;
}

header{
background:#1c4fd7;
color:white;
text-align:center;
padding:18px;
font-size:20px;
font-weight:bold;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
}

main{
padding:20px;
padding-bottom:120px;
}

.card{
background:white;
border-radius:14px;
padding:18px;
margin-bottom:15px;
box-shadow:0 6px 14px rgba(0,0,0,0.15);
animation:fadeIn 0.4s ease;
}

textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#1c4fd7;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#163ea9;
transform:scale(1.02);
transition:0.2s;
}

nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
box-shadow:0 -3px 10px rgba(0,0,0,0.15);
z-index:1000;
}

nav button{
flex:1;
background:none;
border:none;
padding:15px;
font-size:13px;
cursor:pointer;
}

.section{
display:none;
}

.section.active{
display:block;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

#mensaje{
margin-top:10px;
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<header>
🎨 Poli Comunidad
</header>

<main>

<section id="inicio" class="section active">

<div class="card">
<h2>Bienvenido al Poli</h2>
<p>Plataforma para estudiantes del Polivalente de Arte Tandil.</p>
</div>

</section>

<section id="calendario" class="section">

<div class="card">
<h3>9 de Marzo</h3>
<p>Inicio de clases</p>
<p>2° a 6° año</p>
</div>

</section>

<section id="sugerencias" class="section">

<div class="card">

<h3>Sugerencia anónima</h3>

<form id="formSugerencia" action="https://formspree.io/f/mreyzvgd" method="POST">

<select name="categoria">
<option>Infraestructura</option>
<option>Eventos</option>
<option>Convivencia</option>
<option>Ideas nuevas</option>
</select>

<textarea name="sugerencia" placeholder="Escribe tu sugerencia..."></textarea>

<button type="submit">Enviar sugerencia</button>

</form>

<p id="mensaje"></p>

</div>

</section>

<section id="anuncios" class="section">

<div class="card">
<h3>9 DE MARZO</h3>
<p>Paro docente por el Día Internacional de la Mujer.</p>
<p>Se pide a los estudiantes que vayan a la escuela de igual forma.</p>
</div>

</section>

</main>

<nav>
<button onclick="cambiar('inicio')">🏠 Inicio</button>
<button onclick="cambiar('calendario')">📅 Eventos</button>
<button onclick="cambiar('anuncios')">📢 Anuncios</button>
<button onclick="cambiar('sugerencias')">💡 Ideas</button>
</nav>

<script>

function cambiar(id){
document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})
document.getElementById(id).classList.add("active")
}

const form = document.getElementById("formSugerencia");

form.addEventListener("submit", async (e)=>{
e.preventDefault();

const data = new FormData(form);

try{

let res = await fetch(form.action,{
method:"POST",
body:data,
headers:{'Accept':'application/json'}
});

if(res.ok){
document.getElementById("mensaje").innerText="✓ Sugerencia enviada ✅"
form.reset()
}else{
document.getElementById("mensaje").innerText="❌ Error al enviar"
}

}catch(err){
document.getElementById("mensaje").innerText="❌ Error al enviar"
}

});

</script>

</body>
</html>
